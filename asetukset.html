<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LöScaba - Asetukset</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <div class="card">
      <h2>Asetukset</h2>
      
      <div class="form-group" style="margin-top:20px; display:flex; gap:10px; align-items:center;">
        <input type="checkbox" id="darkmode-toggle" style="width:auto; cursor:pointer;">
        <label for="darkmode-toggle" style="margin:0; cursor:pointer;">Tumma tila (Dark Mode)</label>
      </div>

      <div class="form-group" style="margin-top:15px; display:flex; gap:10px; align-items:flex-start;">
        <input type="checkbox" id="email-notif-toggle" style="width:auto; cursor:pointer; margin-top:4px;">
        <label for="email-notif-toggle" style="margin:0; cursor:pointer; line-height:1.4;">
          Minulle saa lähettää sähköpostitse ilmoituksen kun uusi ilmoittautuminen avautuu
        </label>
      </div>

      <button id="save-settings-btn" class="btn btn-primary" style="width:100%; margin-top:20px;">Tallenna asetukset</button>
    </div>

    <div id="quit-tournament-zone" class="card hidden" style="border: 1px solid #c0392b; background: rgba(192, 57, 43, 0.02);">
      <h3 style="color:#c0392b; margin-bottom:10px;">Turnauksen hallinta</h3>
      <p style="font-size:14px; margin-bottom:15px; opacity:0.8;">Olet hyväksytty nykyiseen aktiiviseen turnaukseen. Voit tarvittaessa poistua kisasta alta.</p>
      <button id="quit-tournament-btn" class="btn" style="background:#c0392b; color:white; width:100%;">Peruuta osallistuminen turnaukseen</button>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
  <script src="js/asetukset.js"></script>
</body>
</html>
