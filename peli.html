<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LöScaba Sulkapallopeli</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #f1c40f;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #a2a8d3;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 300;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background: linear-gradient(to bottom, #162447, #1f4068);
            border: 4px solid #f1c40f;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Kursori säädetään nyt dynaamisesti JavaScriptillä! */
        }

        /* Vastustajan asetukset */
        #opponent-container {
            position: absolute;
            top: 40px; /* Jätetään tilaa pisteille */
            left: 160px; /* Aloituspaikka keskellä */
            width: 80px;
            height: 80px;
            z-index: 5;
            transition: left 0.1s ease-out; /* Tekee liikkeestä sulavamman */
        }

        #opponent-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #score-board {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 2px #000;
            z-index: 10;
        }

        #racket {
            position: absolute;
            bottom: 30px;
            left: 175px;
            width: 60px;
            height: 15px;
            background-color: #e74c3c;
            border: 2px solid #ffffff;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.1s;
        }

        .shuttlecock {
            position: absolute;
            width: 25px;
            height: 25px;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 4;
        }

        .normal-sula {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 2L8 10h8l-4-8zm-4 9l-2 7h12l-2-7H8zm0 8h8v2H8v-2z"/></svg>');
        }

        .gold-sula {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f1c40f"><path d="M12 2L8 10h8l-4-8zm-4 9l-2 7h12l-2-7H8zm0 8h8v2H8v-2z"/></svg>');
            filter: drop-shadow(0 0 5px #f1c40f);
        }

        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        button {
            background-color: #f1c40f;
            color: #1a1a2e;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            background-color: #f39c12;
            transform: scale(1.05);
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #a2a8d3;
            text-align: center;
        }
    </style>
</head>
<body>

        <div id="navbar-placeholder"></div>
        <div id="sidebar-placeholder"></div>

    <h1>LöScaba Smash</h1>
    <p class="subtitle">Suojele kenttää – älä päästä sulkaa lattiaan!</p>

    <div id="game-container">
        <div id="score-board">Pisteet: <span id="score">0</span></div>
        
        <div id="opponent-container">
            <img id="opponent-img" src="Smash.png" alt="Vastustaja">
        </div>

        <div id="racket"></div>

        <div id="game-over-screen">
            <h2 style="color: #e74c3c; margin-bottom: 5px;">Peli päättyi!</h2>
            <p id="final-score" style="font-size: 20px; margin-bottom: 20px;">Pisteesi: 0</p>
            <button id="start-btn" onclick="startGame()">Pelaa</button>
            <p class="instructions">Liikuta mailaa hiirellä tai sormella.</p>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script {nonce}>
        const container = document.getElementById('game-container');
        const racket = document.getElementById('racket');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const opponent = document.getElementById('opponent-container');

        let score = 0;
        let isPlaying = false;
        let balls = [];
        let spawnInterval;
        let gameLoopInterval;
        let racketX = 175;
        let speedMultiplier = 1;

        // Alustetaan kursori näkyväksi alussa
        container.style.cursor = 'auto';

        container.addEventListener('mousemove', (e) => {
            if (!isPlaying) return;
            const rect = container.getBoundingClientRect();
            racketX = e.clientX - rect.left - 30;
            updateRacketPosition();
        });

        container.addEventListener('touchmove', (e) => {
            if (!isPlaying) return;
            if (e.touches.length > 0) {
                const rect = container.getBoundingClientRect();
                racketX = e.touches[0].clientX - rect.left - 30;
                updateRacketPosition();
            }
        });

        function updateRacketPosition() {
            if (racketX < 0) racketX = 0;
            if (racketX > 340) racketX = 340;
            racket.style.left = racketX + 'px';
        }

        function startGame() {
            score = 0;
            speedMultiplier = 1;
            scoreDisplay.innerText = score;
            isPlaying = true;
            gameOverScreen.style.display = 'none';
            
            // PIILOTETAAN hiiri kun peli alkaa
            container.style.cursor = 'none';
            
            balls.forEach(ball => ball.element.remove());
            balls = [];

            gameLoopInterval = setInterval(updateGame, 20);
            spawnInterval = setInterval(spawnShuttlecock, 1200);
        }

        function spawnShuttlecock() {
            if (!isPlaying) return;

            // Arvotaan sulalle tippumispaikka x-akselilla
            const startX = Math.floor(Math.random() * 375); // 400 - 25px leveyttä
            
            // Liikutetaan vastustaja-kuva sulan laukaisupisteeseen!
            // Vähennetään hieman, jotta sulka lähtee "keskeltä" vastustajaa
            let opponentX = startX - 25; 
            if (opponentX < 0) opponentX = 0;
            if (opponentX > 320) opponentX = 320;
            opponent.style.left = opponentX + 'px';

            const ballElement = document.createElement('div');
            ballElement.classList.add('shuttlecock');
            
            const isGold = Math.random() < 0.15;
            ballElement.classList.add(isGold ? 'gold-sula' : 'normal-sula');

            ballElement.style.left = startX + 'px';
            ballElement.style.top = '100px'; // Lähtee vastustajan alapuolelta
            container.appendChild(ballElement);

            balls.push({
                element: ballElement,
                x: startX,
                y: 100,
                speed: (Math.random() * 2 + 2) * speedMultiplier,
                isGold: isGold
            });

            if (score > 0 && score % 50 === 0) {
                speedMultiplier += 0.1;
            }
        }

        function updateGame() {
            for (let i = balls.length - 1; i >= 0; i--) {
                let ball = balls[i];
                ball.y += ball.speed;
                ball.element.style.top = ball.y + 'px';

                if (ball.y >= 440 && ball.y <= 455) {
                    if (ball.x + 25 >= racketX && ball.x <= racketX + 60) {
                        racket.style.backgroundColor = '#2ecc71';
                        setTimeout(() => racket.style.backgroundColor = '#e74c3c', 100);

                        score += ball.isGold ? 25 : 10;
                        scoreDisplay.innerText = score;

                        ball.element.remove();
                        balls.splice(i, 1);
                        continue;
                    }
                }

                if (ball.y > 500) {
                    endGame();
                    break;
                }
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameLoopInterval);
            clearInterval(spawnInterval);
            finalScoreDisplay.innerText = "LöScaba-pisteesi: " + score;
            gameOverScreen.style.display = 'flex';
            
            // VAPAUTETAAN HIIRI – Kursori palautuu normaaliksi!
            container.style.cursor = 'auto';
        }
        
    </script>
</body>
</html>
