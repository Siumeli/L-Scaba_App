<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LöScaba - Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <section class="card">
      <h2>Luo uusi turnaus (Max 1 kerrallaan)</h2>
      <div class="form-group"><label>Nimi (FI)</label><input type="text" id="adm-name-fi"></div>
      <div class="form-group"><label>Name (EN)</label><input type="text" id="adm-name-en"></div>
      <div class="form-group"><label>Kuva URL</label><input type="text" id="adm-image"></div>
      
      <div class="form-group"><label>Alkamispäivä</label><input type="date" id="adm-date"></div>
      <div class="form-group"><label>Alkamisaika</label><input type="time" id="adm-time"></div>
      <div class="form-group"><label>Sijainti / Paikka</label><input type="text" id="adm-location"></div>
      
      <div class="form-group"><label>Kuvaus (FI)</label><textarea id="adm-desc-fi"></textarea></div>
      <div class="form-group"><label>Description (EN)</label><textarea id="adm-desc-en"></textarea></div>
      
      <h3 style="margin: 15px 0 10px 0;">Mainokset etusivulle (Kuvien URL-osoitteet)</h3>
      <div class="form-group"><label>Mainos 1 Kuva URL</label><input type="text" id="adm-ad1"></div>
      <div class="form-group"><label>Mainos 2 Kuva URL</label><input type="text" id="adm-ad2"></div>
      
      <button id="adm-publish-btn" class="btn btn-primary" style="width:100%;">Julkaise turnaus etusivulle</button>
      <button id="adm-del-btn" class="btn btn-secondary hidden" style="width:100%; margin-top:10px; background:#c0392b;">Poista aktiivinen turnaus</button>
    </section>

    <section class="card">
      <h2>Odottavat hyväksynnät</h2>
      <table id="adm-req-table">
        <thead>
          <tr>
            <th>Nimi</th>
            <th>Singeli (Kaksinpeli)</th>
            <th>Neluri (Nelinpeli)</th>
            <th>Toiminto</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
