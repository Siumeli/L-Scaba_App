<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LöScaba - Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <!-- TURNAUKSEN HALLINTA -->
    <section class="card">
      <h2 style="margin-bottom:15px; color:var(--primary-color);">Turnauksen asetukset</h2>
      <div class="form-group"><label>Nimi (FI)</label><input type="text" id="adm-name-fi"></div>
      <div class="form-group"><label>Name (EN)</label><input type="text" id="adm-name-en"></div>
      
      <div class="form-group">
        <label>Turnauksen kuva</label>
        <input type="file" id="adm-image-file" accept="image/*" style="margin-bottom: 8px;">
        <input type="text" id="adm-image" placeholder="Tai syötä kuvan URL-osoite">
      </div>
      
      <div class="datetime-row">
        <div class="form-group">
          <label>Alkamispäivä (Kalenteri)</label>
          <input type="date" id="adm-date">
        </div>
        <div class="form-group">
          <label>Alkamisaika (Kello)</label>
          <input type="time" id="adm-time">
        </div>
      </div>
      
      <div class="form-group"><label>Sijainti / Paikka</label><input type="text" id="adm-location"></div>
      
      <div class="form-group"><label>Kuvaus (FI)</label><textarea id="adm-desc-fi" class="auto-resize"></textarea></div>
      <div class="form-group"><label>Description (EN)</label><textarea id="adm-desc-en" class="auto-resize"></textarea></div>
      
      <button id="adm-publish-btn" class="btn btn-primary" style="width:100%;">Julkaise / Päivitä turnaus</button>
      <button id="adm-del-btn" class="btn btn-secondary hidden" style="width:100%; margin-top:10px; background:#c0392b;">Poista aktiivinen turnaus</button>
    </section>

    <!-- MAINOKSIEN HALLINTA (TÄYSIN ERILLÄÄN) -->
    <section class="card">
      <h2 style="margin-bottom:15px; color:var(--primary-color);">Mainoksien hallinta (Etusivu)</h2>
      
      <!-- MAINOS 1 -->
      <div style="border: 2px solid var(--border-color); padding: 20px; border-radius: 10px; margin-bottom: 20px; background:rgba(0,0,0,0.01);">
        <h3 style="margin-bottom:10px;">Mainoskohta 1</h3>
        <div class="form-group"><label>Otsikkoteksti</label><input type="text" id="adm-ad1-title"></div>
        <div class="form-group">
          <label>Mainoskuva</label>
          <input type="file" id="adm-ad1-file" accept="image/*" style="margin-bottom: 8px;">
          <input type="text" id="adm-ad1" placeholder="Tai syötä kuvan URL-osoite">
        </div>
        <div class="form-group"><label>Linkki (URL - tekee kuvasta painikkeen)</label><input type="text" id="adm-ad1-link" placeholder="https://..."></div>
        <div style="display:flex; gap:10px;">
          <button id="adm-save-ad1-btn" class="btn btn-primary" style="flex:1;">Tallenna Mainos 1</button>
          <button id="adm-del-ad1-btn" class="btn btn-secondary hidden" style="background:#c0392b;">Poista mainos</button>
        </div>
      </div>

      <!-- MAINOS 2 -->
      <div style="border: 2px solid var(--border-color); padding: 20px; border-radius: 10px; background:rgba(0,0,0,0.01);">
        <h3 style="margin-bottom:10px;">Mainoskohta 2</h3>
        <div class="form-group"><label>Otsikkoteksti</label><input type="text" id="adm-ad2-title"></div>
        <div class="form-group">
          <label>Mainoskuva</label>
          <input type="file" id="adm-ad2-file" accept="image/*" style="margin-bottom: 8px;">
          <input type="text" id="adm-ad2" placeholder="Tai syötä kuvan URL-osoite">
        </div>
        <div class="form-group"><label>Linkki (URL - tekee kuvasta painikkeen)</label><input type="text" id="adm-ad2-link" placeholder="https://..."></div>
        <div style="display:flex; gap:10px;">
          <button id="adm-save-ad2-btn" class="btn btn-primary" style="flex:1;">Tallenna Mainos 2</button>
          <button id="adm-del-ad2-btn" class="btn btn-secondary hidden" style="background:#c0392b;">Poista mainos</button>
        </div>
      </div>
    </section>

    <!-- ODOTTAVAT HYVÄKSYNNÄT -->
    <section class="card">
      <h2 style="margin-bottom:15px; color:var(--primary-color);">Odottavat hyväksynnät</h2>
      <table id="adm-req-table">
        <thead>
          <tr>
            <th>Nimi</th>
            <th>Singeli (Kaksinpeli)</th>
            <th>Neluri (Nelinpeli)</th>
            <th>Toiminto</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
