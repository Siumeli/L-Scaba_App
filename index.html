<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LöScaba - Etusivu</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <div id="home-tournament-container"></div>
  </main>

  <div id="join-modal" class="modal hidden">
    <div class="modal-content">
      <h3 style="margin-bottom:15px;">Ilmoittautumistiedot</h3>
      <div class="form-group">
        <label>Haluatko osallistua singeliin (kaksinpeli)?</label>
        <select id="modal-singles"><option value="kyllä">Kyllä</option><option value="ei">Ei</option></select>
      </div>
      <div class="form-group">
        <label>Mihin luokkaan haluat osallistua?</label>
        <select id="modal-class">
          <option value="hupi">Hupi (Casual)</option>
          <option value="harraste">Harraste (Intermediate)</option>
          <option value="kilpa">Kilpa (Pro)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Haluatko osallistua neluriin (nelinpeli)?</label>
        <select id="modal-doubles"><option value="kyllä">Kyllä</option><option value="ei">Ei</option></select>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
        <button id="close-modal-btn" class="btn btn-secondary">Askel taaksepäin</button>
        <button id="confirm-join-btn" class="btn btn-primary">Lähetä pyyntö</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
  <script src="js/index-home.js"></script>
</body>
</html>
